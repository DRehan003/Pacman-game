<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pacman MVP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="game-container">
      <h1 class="title">Pacman MVP</h1>
      <div class="hud">
        <div id="captures">Ghosts captured: 0</div>
        <div id="speed">Speed: 1.0x</div>
      </div>
      <canvas id="game" width="608" height="672"></canvas>
      <p class="instructions">
        Use arrow keys (or WASD) to move. Press R to reset.
      </p>
    </div>
    <script src="game.js"></script>
  </body>
</html>
